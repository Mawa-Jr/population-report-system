services:
  mysql:
    image: mysql:8.0
    container_name: population-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: world
    ports:
      - "3306:3306"
    volumes:
      - ./world.sql:/docker-entrypoint-initdb.d/world.sql

  app:
    build: .
    container_name: population-app
    depends_on:
      - mysql
    stdin_open: true
    tty: true
    environment:
      DB_URL: jdbc:mysql://mysql:3306/world
      DB_USER: root
      DB_PASSWORD: root
    command: >
      sh -c "
        echo 'Waiting for MySQL...' &&
        sleep 20 &&
        java -jar app.jar
      "